services:
  # MySQL数据库
  mysql:
    image: mysql:8.0
    container_name: career-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-password}
      MYSQL_DATABASE: ${DB_NAME:-career_assessment}
      TZ: Asia/Shanghai
    ports:
      # 3306: 数据库服务端口
      - "${DB_PORT:-3306}:3306"
      # 33060: MySQL X Protocol（用于debug）
      - "33060:33060"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    command: --default-authentication-plugin=mysql_native_password
    networks:
      - career-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Node.js后端服务
  backend:
    build: ./backend
    container_name: career-backend
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3000
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-career_assessment}
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD:-password}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Lonlink789}
      SESSION_SECRET: ${SESSION_SECRET:-career-assessment-secret}
      FRONTEND_URL: http://localhost:8080
    ports:
      # 3000: API服务端口
      - "3000:3000"
      # 9229: Node.js调试端口（用于Chrome DevTools调试）
      - "9229:9229"
    volumes:
      - ./backend/src:/app/src
      - ./uploads:/app/uploads
      - /app/node_modules
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - career-network
    command: >
      sh -c "
        echo '等待数据库就绪...' &&
        sleep 5 &&
        echo '启动生产模式...' &&
        npm start
      "

  # Nginx前端服务
  frontend:
    image: nginx:alpine
    container_name: career-frontend
    restart: unless-stopped
    ports:
      # 8080: 前端访问端口
      - "8080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - career-network

volumes:
  mysql_data:
    driver: local

networks:
  career-network:
    driver: bridge